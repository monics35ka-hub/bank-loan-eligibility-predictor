<!DOCTYPE html>
<html>
<head>
    <title>Bank Loan Eligibility Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Bank Loan Eligibility Predictor</h2>
        <form action="/predict" method="post">
            <input type="number" name="ApplicantIncome" placeholder="Applicant Income" class="form-control mb-2" required>
            <input type="number" name="CoapplicantIncome" placeholder="Coapplicant Income" class="form-control mb-2" required>
            <input type="number" name="LoanAmount" placeholder="Loan Amount" class="form-control mb-2" required>
            <input type="number" name="Loan_Amount_Term" placeholder="Loan Term" class="form-control mb-2" required>
            <input type="number" name="Credit_History" placeholder="Credit History (1 or 0)" class="form-control mb-2" required>
            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>
    </div>
</div>
</body>
</html>
